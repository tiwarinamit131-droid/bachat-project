  <main>
    <section class="container">
      <h1>Create a Group</h1>
      <form id="group-form" class="card">
        <label for="group-name">Group Name</label>
        <input type="text" id="group-name" required>
        <label for="member-name">Add Member</label>
        <div class="member-input-row">
          <input type="text" id="member-name">
          <button type="button" id="add-member-btn" class="btn">Add</button>
        </div>
        <div id="members-list" class="members-list"></div>
        <button type="submit" class="btn">Create Group</button>
        <div id="group-form-msg" class="form-msg"></div>
      </form>
      <h2>Created Groups</h2>
      <div id="groups-list" class="groups-list"></div>
    </section>
